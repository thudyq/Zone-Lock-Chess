<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的棋类游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>我的棋类游戏</h1>

    <div id="topBar">
        <p>
            <label for="boardSize">棋盘大小：</label>
            <select id="boardSize">
                <option value="6">6 × 6</option>
                <option value="8" selected>8 × 8</option>
                <option value="10">10 × 10</option>
                <option value="12">12 × 12</option>
            </select>
        </p>

        <button type="button" id="restartBtn">重新开始</button>
        <button type="button" id="undoBtn">悔棋</button>
        <button type="button" id="themeToggle" title="切换主题">🌙</button>

        <label for="gameMode">模式：</label>
        <select id="gameMode">
            <option value="pvp">双人对战</option>
            <option value="ai">人机对战</option>
            <option value="online">在线对战</option>
        </select>

        <label id="aiDifficultyLabel" class="ai-difficulty-label" for="aiDifficulty">AI 难度：</label>
        <select id="aiDifficulty" class="ai-difficulty-select">
            <option value="easy">简单</option>
            <option value="medium" selected>中等</option>
            <option value="hard">困难</option>
            <option value="expert">专家</option>
        </select>
    </div>

    <div id="mainArea">
        <div id="boardContainer">
            <div id="gameArea">
                <div id="columnLabels"></div>
                <div id="boardRow">
                    <div id="rowLabels"></div>
                    <div id="board"></div>
                </div>
            </div>
        </div>

        <div id="sidePanel">
            <div class="panelCard">
                <p id="turnText">当前玩家：黑棋</p>
                <p id="moveCountText"></p>
                <p id="evaluationText"></p>

                <div id="historyPanel">
                    <h3>棋谱记录</h3>
                    <ol id="historyList"></ol>
                </div>

                <div id="onlinePanel" class="hidden">
                    <h3>在线对战</h3>
                    <div id="onlineCreateSection">
                        <button type="button" id="createRoomBtn">创建房间</button>
                    </div>
                    <div id="onlineJoinSection">
                        <input type="text" id="roomCodeInput" placeholder="输入房间号(6位数字)" maxlength="6">
                        <button type="button" id="joinRoomBtn">加入房间</button>
                    </div>
                    <div class="server-url-section">
                        <input type="text" id="serverUrlInput" placeholder="后端地址，如 http://localhost:3000">
                        <button type="button" id="applyServerUrlBtn">应用</button>
                    </div>
                    <div id="onlineStatus"></div>
                    <div id="roomCodeDisplay" class="hidden"></div>
                    <button type="button" id="leaveRoomBtn" class="hidden">离开房间</button>
                </div>

                <div id="recordPanel">
                    <h3>棋谱操作</h3>
                    <button type="button" id="exportBtn">导出棋谱</button>
                    <button type="button" id="importBtn">导入棋谱</button>
                    <input type="file" id="importFile" accept=".json" class="hidden">
                </div>

                <div id="replayPanel" class="hidden">
                    <h3>回放控制</h3>
                    <div id="replayControls">
                        <button type="button" id="replayFirst" title="开始">⏮</button>
                        <button type="button" id="replayPrev" title="上一步">⏴</button>
                        <button type="button" id="replayPlayPause" title="播放/暂停">▶</button>
                        <button type="button" id="replayNext" title="下一步">⏵</button>
                        <button type="button" id="replayLast" title="结束">⏭</button>
                    </div>
                    <div id="replaySpeed">
                        <label for="replaySpeedSelect">速度：</label>
                        <select id="replaySpeedSelect">
                            <option value="2000">慢</option>
                            <option value="1000" selected>正常</option>
                            <option value="500">快</option>
                        </select>
                    </div>
                    <button type="button" id="resumeGameBtn">从当前步继续对弈</button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" class="hidden">
        <div id="resultBox">
            <h2 id="resultText"></h2>
            <div id="resultActions">
                <button type="button" id="playAgainBtn">再来一局</button>
                <button type="button" id="exportResultBtn">导出当前棋谱</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
